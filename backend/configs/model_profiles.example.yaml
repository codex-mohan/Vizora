active_profile: mvp

profiles:
  mvp:
    name: mvp
    detector:
      choice: yolo11n
      runtime: pytorch
      weights: models/detect/yolo11n.pt
      confidence_threshold: 0.35
      iou_threshold: 0.6
    tracker:
      choice: byte_track_v2
      runtime: pytorch
      max_lost_frames: 30
      association_threshold: 0.5
    pose:
      choice: rtmo_m
      runtime: pytorch
      weights: models/pose/rtmo_m.pth
      confidence_threshold: 0.4
    helmet_classifier:
      choice: efficientnetv2_s
      runtime: pytorch
      weights: models/classify/helmet_effnetv2_s.pth
      confidence_threshold: 0.55
    seatbelt_classifier:
      choice: efficientnetv2_s
      runtime: pytorch
      weights: models/classify/seatbelt_effnetv2_s.pth
      confidence_threshold: 0.6
    plate_detector:
      choice: yolo11_plate
      runtime: pytorch
      weights: models/anpr/yolo11_plate.pt
      confidence_threshold: 0.35
    ocr:
      primary: paddleocr_pp_ocrv5
      fallback: parseq
      accept_threshold: 0.7
      review_threshold: 0.6
      primary_runtime: pytorch
      fallback_runtime: pytorch
    vlm:
      choice: qwen2_5_vl_3b
      runtime: huggingface
      weights: models/vlm/qwen2_5_vl_3b
